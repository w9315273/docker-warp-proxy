name: Build and Release Docker image

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Read VERSION file
        id: version
        run: echo "version=$(cat VERSION)" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/docker-warp-proxy:latest
            ghcr.io/${{ github.repository_owner }}/docker-warp-proxy:${{ steps.version.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/docker-warp-proxy:${{ github.ref_name }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: |
            自动化发布。
            镜像tags:
              - ghcr.io/${{ github.repository_owner }}/docker-warp-proxy:latest
              - ghcr.io/${{ github.repository_owner }}/docker-warp-proxy:${{ github.ref_name }}
          token: ${{ secrets.GHCR_PAT }}